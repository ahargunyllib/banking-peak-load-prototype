name: CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: marquisccel/banking-peak-load

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Test
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t $IMAGE_NAME:latest -f deployments/docker/Dockerfile .

      - name: Push Image
        run: docker push $IMAGE_NAME:latest