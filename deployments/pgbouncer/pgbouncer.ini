[databases]
banking = host=postgres port=5432 dbname=banking

[pgbouncer]
listen_addr        = 0.0.0.0
listen_port        = 6432
auth_type          = trust
pool_mode          = transaction
max_client_conn    = 1000
default_pool_size  = 30
server_reset_query = DISCARD ALL
logfile            =
pidfile            =
log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1
server_check_query = SELECT 1
