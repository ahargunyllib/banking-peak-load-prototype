---
- name: Common setup for cloud demo hosts
  hosts: cloud
  become: true
  gather_facts: false
  vars_files:
    - ../vars/app.yml
    - ../vars/infra.yml

  tasks:
    - name: Prepare Ansible remote temp directory for become tasks
      ansible.builtin.raw: sudo mkdir -p /root/.ansible/tmp && sudo chmod 700 /root/.ansible /root/.ansible/tmp
      changed_when: false

    - name: Install base packages and Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - lsb-release
          - python3-apt
          - docker.io
        update_cache: true
        cache_valid_time: 3600
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add SSH user to docker group
      ansible.builtin.user:
        name: "{{ ssh_user }}"
        groups: docker
        append: true

    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Docker Compose plugin
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        owner: root
        group: root
        mode: "0755"

    - name: Add docker-compose compatibility symlink
      ansible.builtin.file:
        src: /usr/local/lib/docker/cli-plugins/docker-compose
        dest: /usr/local/bin/docker-compose
        state: link
        force: true

    - name: Verify Docker Compose
      ansible.builtin.command: docker compose version
      register: docker_compose_check
      changed_when: false
