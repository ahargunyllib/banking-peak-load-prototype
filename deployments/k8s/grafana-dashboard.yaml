apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: banking
data:
  grafana-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Total Throughput (TPS)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "green", "value": 278 }
                ]
              },
              "mappings": [],
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"banking-api\"}[1m]))",
              "legendFormat": "TPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "P95 Latency",
          "type": "gauge",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0,
              "max": 5,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1.5 },
                  { "color": "red", "value": 2 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"banking-api\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Global Error Rate",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.005 },
                  { "color": "red", "value": 0.01 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"banking-api\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"banking-api\"}[5m]))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Uptime / Availability",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.999 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "expr": "avg_over_time(up{job=~\"banking-api|postgres\"}[24h])",
              "legendFormat": "{{ job }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Rate Limiter Drops (HTTP 429)",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"banking-api\",status=\"429\"}[1m]))",
              "legendFormat": "Dropped Requests",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Redis Cache Hit Ratio",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.7 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)",
              "legendFormat": "Cache Hit Ratio",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "RabbitMQ Queue Depth",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 5000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "rabbitmq_queue_messages{vhost=\"/\"}",
              "legendFormat": "{{ queue }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Circuit Breaker Status",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "CLOSED ✅", "color": "green" } } },
                { "type": "value", "options": { "1": { "text": "OPEN 🔴", "color": "red" } } },
                { "type": "value", "options": { "2": { "text": "HALF-OPEN 🟡", "color": "yellow" } } }
              ]
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "circuit_breaker_state{job=\"banking-api\"}",
              "legendFormat": "{{ name }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "PostgreSQL Active Connections (via PgBouncer)",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 16, "x": 0, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Max Limit" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } },
                  { "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } },
                  { "id": "custom.lineWidth", "value": 2 }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "pgbouncer_pools_client_active_connections",
              "legendFormat": "Active Connections",
              "refId": "A"
            },
            {
              "expr": "vector(100)",
              "legendFormat": "Max Limit",
              "refId": "B"
            }
          ]
        },
        {
          "id": 10,
          "title": "Active Connections (Bar)",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 19 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "red", "value": 100 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "pgbouncer_pools_client_active_connections",
              "legendFormat": "{{ database }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "CPU & Memory Utilization",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 16, "x": 0, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{name=~\".+\"}[1m])) by (name)",
              "legendFormat": "CPU: {{ name }}",
              "refId": "A"
            },
            {
              "expr": "container_memory_usage_bytes{name=~\".+\"} / container_spec_memory_limit_bytes{name=~\".+\"}",
              "legendFormat": "MEM: {{ name }}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Resource Utilization (Bar)",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 26 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{name=~\".+\"}[1m])) by (name)",
              "legendFormat": "CPU: {{ name }}",
              "refId": "A"
            },
            {
              "expr": "container_memory_usage_bytes{name=~\".+\"} / container_spec_memory_limit_bytes{name=~\".+\"}",
              "legendFormat": "MEM: {{ name }}",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["banking", "peak-load", "monitoring"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Banking Peak Load Monitor",
      "uid": "banking-peak-load",
      "version": 1
    }
