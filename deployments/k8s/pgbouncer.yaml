apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: banking

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pgbouncer

  template:
    metadata:
      labels:
        app: pgbouncer

    spec:
      containers:
        - name: pgbouncer

          image: bitnami/pgbouncer:1.23.1

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRESQL_HOST
              value: postgres

            - name: POSTGRESQL_PORT
              value: "5432"

            - name: POSTGRESQL_USERNAME
              value: postgres

            - name: POSTGRESQL_PASSWORD
              value: postgres

            - name: POSTGRESQL_DATABASE
              value: banking

            - name: PGBOUNCER_AUTH_TYPE
              value: trust

            - name: PGBOUNCER_POOL_MODE
              value: transaction

            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "1000"

            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "80"

---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: banking

spec:
  selector:
    app: pgbouncer

  ports:
    - port: 5432
      targetPort: 5432